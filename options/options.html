<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Companion Settings</title>
  <link rel="stylesheet" href="../src/styles/tokens.css" />
  <link rel="stylesheet" href="./options.css" />
</head>
<body>
  <header class="page-header">
    <h1>Research Companion Settings</h1>
  </header>

  <form id="settings-form">
    <label>
      LLM provider
      <select name="provider">
        <option value="">-- choose --</option>
        <option value="anthropic">Anthropic</option>
        <option value="openai">OpenAI</option>
        <option value="gemini">Gemini</option>
        <option value="openrouter">OpenRouter</option>
      </select>
    </label>

    <label class="field-secondary">
      Model (optional, uses provider default if blank)
      <input type="text" name="model" />
    </label>
    <p class="field-hint">Examples: claude-3-5-sonnet-20241022 (Anthropic), gpt-4o (OpenAI), gemini-1.5-pro (Gemini).</p>

    <fieldset>
      <legend>Provider credentials</legend>
      <p class="field-hint">Stored only on this device. Never sent anywhere except the provider you select above. <a href="https://aryamanw.github.io/researcher-ai-extn/privacy-policy.html" target="_blank" rel="noopener">Privacy policy</a>.</p>
      <label class="key-field" data-provider="anthropic">
        Anthropic API key
        <div class="key-input-row">
          <input type="password" name="anthropicKey" aria-describedby="anthropicKey-warning" />
          <button type="button" class="key-toggle" data-target="anthropicKey" data-label="Anthropic API key" aria-label="Show Anthropic API key">Show</button>
        </div>
        <p class="key-warning" id="anthropicKey-warning" data-for="anthropicKey" aria-live="polite" hidden></p>
      </label>
      <label class="key-field" data-provider="openai">
        OpenAI API key
        <div class="key-input-row">
          <input type="password" name="openaiKey" aria-describedby="openaiKey-warning" />
          <button type="button" class="key-toggle" data-target="openaiKey" data-label="OpenAI API key" aria-label="Show OpenAI API key">Show</button>
        </div>
        <p class="key-warning" id="openaiKey-warning" data-for="openaiKey" aria-live="polite" hidden></p>
      </label>
      <label class="key-field" data-provider="gemini">
        Gemini API key
        <div class="key-input-row">
          <input type="password" name="geminiKey" aria-describedby="geminiKey-warning" />
          <button type="button" class="key-toggle" data-target="geminiKey" data-label="Gemini API key" aria-label="Show Gemini API key">Show</button>
        </div>
        <p class="key-warning" id="geminiKey-warning" data-for="geminiKey" aria-live="polite" hidden></p>
      </label>
      <div class="key-field" data-provider="openrouter">
        <p class="field-hint">OpenRouter uses sign-in, not a pasted key.</p>
        <div class="openrouter-row">
          <button type="button" id="connect-openrouter" class="button-primary">Connect to OpenRouter</button>
          <span id="openrouter-status"></span>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Search</legend>
      <label>
        Search provider
        <select name="searchProvider">
          <option value="brave">Brave Search (requires API key)</option>
          <option value="duckduckgo">DuckDuckGo (no key, completely free)</option>
        </select>
      </label>

      <label class="key-field" data-search-provider="brave">
        Brave Search API key
        <div class="key-input-row">
          <input type="password" name="braveSearchKey" aria-describedby="braveSearchKey-warning" />
          <button type="button" class="key-toggle" data-target="braveSearchKey" data-label="Brave Search API key" aria-label="Show Brave Search API key">Show</button>
        </div>
        <p class="key-warning" id="braveSearchKey-warning" data-for="braveSearchKey" aria-live="polite" hidden></p>
      </label>
    </fieldset>

    <label>
      Number of results
      <input type="number" name="resultsCount" min="1" max="20" aria-describedby="results-count-hint" />
    </label>
    <p class="field-hint" id="results-count-hint" aria-live="polite" hidden></p>

    <p class="autosave-status" id="autosave-status" role="status" aria-live="polite"></p>
  </form>

  <script type="module" src="./main.js"></script>
</body>
</html>
