<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Companion</title>
  <link rel="stylesheet" href="../src/styles/tokens.css" />
  <link rel="stylesheet" href="./sidepanel.css" />
</head>
<body>
  <header class="panel-header">
    <h1 title="Re-run search: Ctrl+Shift+R (Cmd+Shift+R on Mac)">Research Companion</h1>
  </header>

  <main id="results" aria-live="polite"></main>

  <section class="history">
    <div class="history-header">
      <h2>History</h2>
      <button type="button" id="clear-history" class="history-clear">Clear</button>
    </div>
    <ul id="history-list"></ul>
  </section>

  <script type="module" src="./main.js"></script>
</body>
</html>
